name: Tag Count Update

on:
  schedule:
    - cron: '0 4 * * 0'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: data-branch-publish
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout source (main)
        uses: actions/checkout@v4

      - name: Download URenko/e-hentai-db nightly SQLite
        run: |
          set -euo pipefail
          curl -fsSL -o e-hentai.db.zstd \
            https://github.com/URenko/e-hentai-db/releases/download/nightly/e-hentai.db.zstd
          zstd -d e-hentai.db.zstd -o e-hentai.db
          rm e-hentai.db.zstd

      - name: Generate CSV
        run: python3 scripts/gen-tag-count.py e-hentai.db tagname_count.csv.gz

      - name: Checkout data branch (separate worktree)
        uses: actions/checkout@v4
        with:
          ref: data
          path: data-branch

      - name: Publish to data branch (tag-count/)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p data-branch/tag-count
          mv tagname_count.csv.gz data-branch/tag-count/
          cd data-branch
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          if git diff --quiet -- tag-count/; then
            echo "no change, skip commit"
            exit 0
          fi
          git add tag-count/
          git commit -m "tag-count snapshot $(date -u +%Y-%m-%d)"
          git push origin data
